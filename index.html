<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Proptech AI Map</title>
  <meta name="description" content="Interactive floating ecosystem of AI-powered proptech companies." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Proptech AI Map" />
  <meta property="og:description" content="Interactive floating ecosystem of AI-powered proptech companies." />
  <meta property="og:image" content="https://wex-corporation.github.io/proptech-ai-map/assets/thumbnail-proptech-ai-map.png" />
  <meta property="og:url" content="https://wex-corporation.github.io/proptech-ai-map/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Proptech AI Map" />
  <meta name="twitter:description" content="Interactive floating ecosystem of AI-powered proptech companies." />
  <meta name="twitter:image" content="https://wex-corporation.github.io/proptech-ai-map/assets/thumbnail-proptech-ai-map.png" />
  <link rel="icon" href="data:," />
  <link rel="preload" as="image" href="./assets/thumbnail-proptech-ai-map.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="assets/kpf-logo.png" alt="Korea Proptech Forum" class="brand-logo">
    </div>
    <nav class="view-tabs" aria-label="보기 전환">
      <button class="tab is-active" type="button" data-view="map">프롭테크 AI 맵</button>
      <button class="tab" type="button" data-view="directory">기업 목록</button>
      <button class="tab" type="button" data-view="business">비즈니스 영역</button>
    </nav>
  </header>

  <main>
    <div class="space-field" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <section class="hero" aria-labelledby="page-title">
      <div>
<h1 id="page-title">Proptech AI Map</h1>
        <p class="lead">
          <span id="lead-main">AI 기반 서비스를 제공하는 프롭테크 기업을 부동산 라이프사이클에 따라 분류했습니다.</span>
        </p>
      </div>
      <div class="stats" aria-label="맵 통계">
        <div><strong id="unique-company-count">0</strong><span>Total Companies</span></div>
        <div id="stat-logo-placements"><strong id="company-count">0</strong><span>Logo placements</span></div>
        <div><strong>5</strong><span>Lifecycle stages</span></div>
        <div><strong id="category-count">0</strong><span>Categories</span></div>
      </div>
    </section>

    <section class="controls" aria-label="검색 및 필터">
      <label class="search-box">
        <input id="search-input" type="search" placeholder="회사명, 카테고리, 단계 검색" autocomplete="off" />
      </label>
      <div class="filter-row" id="stage-filters" aria-label="단계 필터"></div>
    </section>

    <section id="map-view" class="view is-active" aria-label="프롭테크 AI 맵"></section>

    <section id="business-view" class="view" aria-label="비즈니스 영역">
      <div class="venn-wrap">
        <div class="venn-diagram">
          <div class="venn-circle-b2b" aria-hidden="true"></div>
          <div class="venn-circle-b2c" aria-hidden="true"></div>
          <div class="venn-zones">
            <div class="venn-zone venn-zone-b2b">
              <div class="venn-zone-label">B2B</div>
              <div class="venn-zone-sub">기업 및 정부·공공기관 대상</div>
              <div class="venn-chip-area floating-list" id="zone-b2b"></div>
            </div>
            <div class="venn-zone venn-zone-both">
              <div class="venn-zone-label">B2B · B2C</div>
              <div class="venn-chip-area floating-list" id="zone-both"></div>
            </div>
            <div class="venn-zone venn-zone-b2c">
              <div class="venn-zone-label">B2C</div>
              <div class="venn-zone-sub">일반 소비자 대상</div>
              <div class="venn-chip-area floating-list" id="zone-b2c"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="directory-view" class="view" aria-label="회사 목록">
      <div class="directory-layout">
        <aside class="side-panel">
          <h2>분류</h2>
          <div id="category-filters" class="category-filter-list"></div>
        </aside>
        <div>
          <div class="result-bar">
            <strong id="result-count">0개 기업</strong>
          </div>
          <div id="directory-grid" class="directory-grid"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© Copyright 2026ㅣKorea Proptech ForumㅣAll Rights Reserved</p>
  </footer>

  <!-- Company detail modal -->
  <div id="company-modal" class="company-modal hidden" role="dialog" aria-modal="true">
    <div class="company-modal-backdrop" id="modal-backdrop"></div>
    <div class="company-modal-box">
      <button class="company-modal-close" id="modal-close" aria-label="닫기">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <template id="company-template">
    <a class="company-chip" target="_blank" rel="noreferrer">
      <span class="orbit-motion">
        <span class="logo-text"></span>
      </span>
      <small></small>
    </a>
  </template>

  <script src="./app.js"></script>
</body>
</html>
