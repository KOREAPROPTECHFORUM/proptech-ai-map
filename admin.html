<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Admin · Proptech AI Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --blue: #2b63ff;
      --ink: #eef4ff;
      --muted: #aeb9d0;
      --line: rgba(178,199,255,0.22);
      --panel: rgba(255,255,255,0.06);
      --red: #ef4444;
      --green: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: Pretendard, Inter, "Noto Sans KR", Arial, sans-serif;
      font-size: 14px;
      background: #060916;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 10px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(5,8,18,0.92);
      backdrop-filter: blur(16px);
    }
    .brand { font-size: 15px; font-weight: 900; }
    .brand em { color: var(--muted); font-style: normal; font-weight: 400; margin-left: 8px; font-size: 13px; }

    /* ── Main ── */
    main { max-width: 1280px; margin: 0 auto; padding: 24px; }

    .toolbar {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .toolbar input[type=search] {
      flex: 1; height: 36px;
      border: 1px solid rgba(255,255,255,0.18); border-radius: 8px;
      padding: 0 14px; background: rgba(255,255,255,0.07); color: var(--ink);
      font: inherit; outline: none;
    }
    .toolbar input[type=search]:focus { border-color: var(--blue); }
    .count { color: var(--muted); font-size: 13px; white-space: nowrap; }

    /* ── Status ── */
    #status {
      display: none; margin-bottom: 16px;
      padding: 12px 16px; border-radius: 8px; font-size: 13px;
    }
    #status.loading { display: block; background: rgba(43,99,255,0.12); border: 1px solid rgba(43,99,255,0.3); }
    #status.success { display: block; background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    #status.error   { display: block; background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }

    /* ── Table ── */
    .table-wrap { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); }
    th {
      padding: 10px 14px; text-align: left;
      color: var(--muted); font-size: 11px; font-weight: 900; letter-spacing: .04em;
      border-bottom: 1px solid var(--line); background: rgba(255,255,255,0.04);
    }
    td { padding: 8px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    tr:last-child td { border-bottom: 0; }
    tr:hover td { background: rgba(255,255,255,0.03); }

    .logo-cell { width: 88px; }
    .logo-thumb {
      width: 76px; height: 30px;
      object-fit: contain; object-position: center;
      background: #fff; border-radius: 5px; padding: 3px 7px;
      display: block;
    }
    .logo-none {
      width: 76px; height: 30px;
      border: 1px dashed rgba(255,255,255,0.2); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--muted);
    }
    .name-cell { font-weight: 700; }
    .featured-dot {
      display: inline-block; margin-left: 6px;
      width: 7px; height: 7px; border-radius: 50%;
      background: #ffd95c;
      box-shadow: 0 0 6px #ffd95c;
    }
    .stage-pill {
      display: inline-block; padding: 3px 8px; border-radius: 999px;
      background: rgba(43,99,255,0.18); color: #aac0ff; font-size: 12px;
    }
    .cat-text { color: var(--muted); font-size: 12px; }
    .url-text {
      font-size: 12px; color: #7aadff; max-width: 200px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .actions { display: flex; gap: 6px; }

    /* ── Buttons ── */
    button { font: inherit; cursor: pointer; }
    .btn-primary {
      border: 0; border-radius: 7px; padding: 8px 16px;
      background: var(--blue); color: #fff; font-weight: 700; font-size: 13px;
    }
    .btn-primary:hover { background: #1a52ee; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost {
      border: 1px solid var(--line); border-radius: 6px; padding: 5px 11px;
      background: rgba(255,255,255,0.06); color: var(--ink); font-size: 12px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.12); }
    .btn-danger {
      border: 1px solid rgba(239,68,68,0.28); border-radius: 6px; padding: 5px 11px;
      background: rgba(239,68,68,0.08); color: #fca5a5; font-size: 12px;
    }
    .btn-danger:hover { background: rgba(239,68,68,0.18); }
    #btn-settings {
      border: 1px solid var(--line); border-radius: 7px; padding: 7px 14px;
      background: transparent; color: var(--ink); font-size: 13px; font-weight: 700;
    }
    #btn-settings:hover { background: rgba(255,255,255,0.07); }

    /* ── Empty ── */
    .empty { padding: 60px 20px; text-align: center; color: var(--muted); }

    /* ── Modal overlay ── */
    .modal {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.72); backdrop-filter: blur(4px);
    }
    .modal.hidden { display: none; }
    .modal-box {
      width: min(540px, calc(100vw - 40px));
      max-height: calc(100vh - 80px); overflow-y: auto;
      border: 1px solid var(--line); border-radius: 14px;
      padding: 30px; background: #0b1326;
      box-shadow: 0 32px 80px rgba(0,0,0,0.65);
    }
    .modal-box h2 { font-size: 18px; margin-bottom: 24px; }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 10px;
      margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--line);
    }

    /* ── Form ── */
    .field { display: grid; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: 12px; font-weight: 900; color: var(--muted); }
    .field .req { color: #f87171; }
    .field input, .field select {
      height: 38px;
      border: 1px solid rgba(255,255,255,0.16); border-radius: 7px;
      padding: 0 12px; background: rgba(255,255,255,0.06);
      color: var(--ink); font: inherit; font-size: 14px; outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--blue); }
    .field select option { background: #0b1326; }
    .field input[type=file] {
      height: auto; padding: 8px 12px; cursor: pointer;
    }
    .field input[type=url] { font-size: 13px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    #logo-preview-wrap {
      display: none; align-items: center; gap: 14px;
      margin-bottom: 16px; padding: 12px 14px;
      border: 1px solid var(--line); border-radius: 8px;
      background: rgba(255,255,255,0.04);
    }
    #logo-preview-wrap.show { display: flex; }
    #logo-preview {
      width: 120px; height: 44px;
      object-fit: contain; object-position: center;
      background: #fff; border-radius: 6px; padding: 4px 8px;
    }
    #logo-fname { font-size: 12px; color: var(--muted); word-break: break-all; }

    .check-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--ink); margin-bottom: 4px;
    }
    .check-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }

    .help-text { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

    /* ── Settings notes ── */
    .pat-note {
      font-size: 12px; color: var(--muted); line-height: 1.6;
      padding: 10px 14px; border-radius: 7px; margin-bottom: 20px;
      background: rgba(43,99,255,0.08); border: 1px solid rgba(43,99,255,0.2);
    }
    .pat-note a { color: #7aadff; }
  </style>
</head>
<body>

<header>
  <div class="brand">Proptech AI Map <em>관리자</em></div>
  <button id="btn-settings">⚙ GitHub 설정</button>
</header>

<main>
  <div class="toolbar">
    <input type="search" id="search" placeholder="기업명, 단계, 카테고리 검색..." />
    <button class="btn-primary" id="btn-add">+ 기업 추가</button>
    <span class="count" id="count"></span>
  </div>

  <div id="status"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="logo-cell">로고</th>
          <th>기업명</th>
          <th>단계</th>
          <th>카테고리</th>
          <th>홈페이지</th>
          <th style="width:110px">관리</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<!-- ── Settings Modal ── -->
<div id="modal-settings" class="modal hidden">
  <div class="modal-box">
    <h2>GitHub 설정</h2>
    <div class="pat-note">
      <strong>Personal Access Token</strong> 이 필요합니다.<br>
      GitHub → Settings → Developer settings → Personal access tokens → <strong>repo 권한</strong> 체크 후 생성하세요.
    </div>
    <div class="field">
      <label>Personal Access Token (PAT)</label>
      <input type="password" id="cfg-pat" placeholder="ghp_..." autocomplete="off" />
    </div>
    <div class="row2">
      <div class="field">
        <label>저장소 소유자</label>
        <input type="text" id="cfg-owner" placeholder="KOREAPROPTECHFORUM" />
      </div>
      <div class="field">
        <label>저장소 이름</label>
        <input type="text" id="cfg-repo" placeholder="proptech-ai-map" />
      </div>
    </div>
    <div class="field">
      <label>브랜치</label>
      <input type="text" id="cfg-branch" placeholder="main" />
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('settings')">취소</button>
      <button class="btn-primary" onclick="applySettings()">저장 및 로드</button>
    </div>
  </div>
</div>

<!-- ── Add / Edit Modal ── -->
<div id="modal-edit" class="modal hidden">
  <div class="modal-box">
    <h2 id="modal-title">기업 추가</h2>

    <div class="field">
      <label>기업명 <span class="req">*</span></label>
      <input type="text" id="f-name" placeholder="기업명 입력" />
    </div>

    <div class="row2">
      <div class="field">
        <label>단계 <span class="req">*</span></label>
        <select id="f-stage">
          <option value="">선택...</option>
        </select>
      </div>
      <div class="field">
        <label>카테고리 <span class="req">*</span></label>
        <select id="f-category">
          <option value="">단계 먼저 선택</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>홈페이지 URL</label>
      <input type="url" id="f-url" placeholder="https://" />
    </div>

    <div class="field">
      <label>로고 이미지</label>
      <input type="file" id="f-logo" accept=".jpg,.jpeg,.png,.svg,.webp" />
      <span class="help-text">파일명이 그대로 assets/logos/ 에 업로드됩니다. (예: 직방.jpg)</span>
    </div>

    <div id="logo-preview-wrap">
      <img id="logo-preview" src="" alt="로고 미리보기" />
      <span id="logo-fname"></span>
    </div>

    <div class="check-row">
      <input type="checkbox" id="f-featured" />
      <label for="f-featured">주요 기업 (Featured) — 금색 테두리 강조</label>
    </div>

    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('edit')">취소</button>
      <button class="btn-primary" id="btn-save" onclick="saveCompany()">저장</button>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const CFG_KEY = 'proptech-admin-cfg';
let cfg = { pat: '', owner: 'KOREAPROPTECHFORUM', repo: 'proptech-ai-map', branch: 'main' };

function loadCfg() {
  try { Object.assign(cfg, JSON.parse(localStorage.getItem(CFG_KEY) || '{}')); } catch {}
}
function saveCfg() { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }

// ── Stages ──────────────────────────────────────────────────────────────────
const STAGES = [
  { id: 'development', name: '개발·건설', cats: [
    { id: 'planning', name: '기획·사업성' },
    { id: 'finance', name: '금융·투자' },
    { id: 'design-permit', name: '설계·인허가' },
    { id: 'procurement', name: '조달·정산' },
    { id: 'construction', name: '시공·현장관리' }
  ]},
  { id: 'transaction', name: '거래·마케팅', cats: [
    { id: 'marketing', name: '마케팅·분양' },
    { id: 'brokerage', name: '중개·거래' }
  ]},
  { id: 'operation', name: '운영 관리', cats: [
    { id: 'rental', name: '임대 운영' },
    { id: 'space-operation', name: '공간 운영' },
    { id: 'facility', name: '건물·시설 관리' },
    { id: 'interior', name: '인테리어·리노베이션' }
  ]},
  { id: 'asset', name: '자산 관리', cats: [
    { id: 'asset-sale', name: '자산관리·매각' },
    { id: 'asset-liquidity', name: '자산 유동화' }
  ]},
  { id: 'infra', name: '인프라', cats: [
    { id: 'data-platform', name: '데이터 API·플랫폼' },
    { id: 'design-tool', name: '설계·디자인' },
    { id: 'contract', name: '인증·계약' }
  ]}
];
const stageMap = Object.fromEntries(STAGES.map(s => [s.id, s]));
const catMap = Object.fromEntries(STAGES.flatMap(s => s.cats.map(c => [c.id, { ...c, stageName: s.name }])));

// ── State ───────────────────────────────────────────────────────────────────
let companies = [];
let companiesSha = null;
let editIdx = -1;
let pendingFile = null;
let currentLogo = '';
let query = '';

// ── GitHub API ───────────────────────────────────────────────────────────────
const GH = 'https://api.github.com';

function ghHeaders() {
  return {
    Authorization: `token ${cfg.pat}`,
    Accept: 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
}

async function ghGet(path) {
  const r = await fetch(`${GH}/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(path)}?ref=${cfg.branch}`, { headers: ghHeaders() });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw Object.assign(new Error(e.message || `HTTP ${r.status}`), { status: r.status }); }
  return r.json();
}

async function ghPut(path, content, sha, msg) {
  const body = { message: msg, content, branch: cfg.branch };
  if (sha) body.sha = sha;
  const r = await fetch(`${GH}/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(path)}`, {
    method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body)
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || `HTTP ${r.status}`); }
  return r.json();
}

function b64Text(text) { return btoa(unescape(encodeURIComponent(text))); }

// ── Data ─────────────────────────────────────────────────────────────────────
async function fetchCompanies() {
  try {
    const f = await ghGet('companies.json');
    companiesSha = f.sha;
    companies = JSON.parse(decodeURIComponent(escape(atob(f.content.replace(/\s/g, ''))))).companies || [];
  } catch (e) {
    if (e.status === 404) { companies = []; companiesSha = null; }
    else throw e;
  }
}

async function persistCompanies(msg) {
  const r = await ghPut('companies.json', b64Text(JSON.stringify({ companies }, null, 2)), companiesSha, msg);
  companiesSha = r.content.sha;
}

async function uploadLogo(file) {
  const b64 = await new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = e => res(e.target.result.split(',')[1]);
    fr.onerror = rej;
    fr.readAsDataURL(file);
  });
  let sha = null;
  try { sha = (await ghGet(`assets/logos/${file.name}`)).sha; } catch {}
  await ghPut(`assets/logos/${file.name}`, b64, sha, `Upload logo: ${file.name}`);
}

// ── Render ───────────────────────────────────────────────────────────────────
function rawUrl(logo) {
  return `https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/${cfg.branch}/assets/logos/${encodeURIComponent(logo)}`;
}

function renderList() {
  const q = query.toLowerCase();
  const filtered = companies
    .map((c, i) => ({ ...c, _i: i }))
    .filter(c => !q ||
      c.name.toLowerCase().includes(q) ||
      (stageMap[c.stage]?.name || '').toLowerCase().includes(q) ||
      (catMap[c.category]?.name || '').toLowerCase().includes(q)
    );

  document.getElementById('count').textContent = `${filtered.length} / ${companies.length}개`;

  const tbody = document.getElementById('tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty">검색 결과가 없습니다.</div></td></tr>';
    return;
  }

  tbody.replaceChildren(...filtered.map(c => {
    const tr = document.createElement('tr');
    const logoHtml = c.logo
      ? `<img class="logo-thumb" src="${rawUrl(c.logo)}" alt="${c.name}" onerror="this.replaceWith(Object.assign(document.createElement('div'), {className:'logo-none', textContent:'없음'}))" />`
      : `<div class="logo-none">없음</div>`;
    tr.innerHTML = `
      <td class="logo-cell">${logoHtml}</td>
      <td class="name-cell">${c.name}${c.featured ? '<span class="featured-dot" title="Featured"></span>' : ''}</td>
      <td><span class="stage-pill">${stageMap[c.stage]?.name || c.stage}</span></td>
      <td class="cat-text">${catMap[c.category]?.name || c.category}</td>
      <td>${c.url ? `<a class="url-text" href="${c.url}" target="_blank">${c.url}</a>` : '<span style="color:var(--muted)">—</span>'}</td>
      <td><div class="actions">
        <button class="btn-ghost" data-edit="${c._i}">수정</button>
        <button class="btn-danger" data-del="${c._i}">삭제</button>
      </div></td>`;
    return tr;
  }));

  tbody.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openEdit(+b.dataset.edit));
  tbody.querySelectorAll('[data-del]').forEach(b => b.onclick = () => deleteCompany(+b.dataset.del));
}

// ── Status ───────────────────────────────────────────────────────────────────
function setStatus(type, text) { const el = document.getElementById('status'); el.className = type; el.textContent = text; }
function clearStatus() { const el = document.getElementById('status'); el.className = ''; el.style.display = 'none'; }

// ── Modal ────────────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(`modal-${id}`).classList.remove('hidden'); }
function closeModal(id) {
  document.getElementById(`modal-${id}`).classList.add('hidden');
  if (id === 'edit') {
    pendingFile = null; currentLogo = '';
    document.getElementById('logo-preview-wrap').classList.remove('show');
    document.getElementById('f-logo').value = '';
  }
}

// ── Settings ─────────────────────────────────────────────────────────────────
document.getElementById('btn-settings').onclick = () => {
  document.getElementById('cfg-pat').value = cfg.pat;
  document.getElementById('cfg-owner').value = cfg.owner;
  document.getElementById('cfg-repo').value = cfg.repo;
  document.getElementById('cfg-branch').value = cfg.branch;
  openModal('settings');
};

async function applySettings() {
  cfg.pat = document.getElementById('cfg-pat').value.trim();
  cfg.owner = document.getElementById('cfg-owner').value.trim() || 'wex-corporation';
  cfg.repo = document.getElementById('cfg-repo').value.trim() || 'proptech-ai-map';
  cfg.branch = document.getElementById('cfg-branch').value.trim() || 'main';
  saveCfg();
  closeModal('settings');
  await loadData();
}

// ── Stage / Category dropdowns ────────────────────────────────────────────────
function initStageSelect() {
  const sel = document.getElementById('f-stage');
  sel.replaceChildren(
    new Option('선택...', ''),
    ...STAGES.map(s => new Option(s.name, s.id))
  );
}

document.getElementById('f-stage').onchange = function () {
  const stage = stageMap[this.value];
  const sel = document.getElementById('f-category');
  sel.replaceChildren(
    new Option('선택...', ''),
    ...(stage?.cats || []).map(c => new Option(c.name, c.id))
  );
};

// ── Logo preview ──────────────────────────────────────────────────────────────
document.getElementById('f-logo').onchange = function () {
  const file = this.files[0];
  if (!file) return;
  pendingFile = file;
  const fr = new FileReader();
  fr.onload = e => {
    document.getElementById('logo-preview').src = e.target.result;
    document.getElementById('logo-fname').textContent = file.name;
    document.getElementById('logo-preview-wrap').classList.add('show');
  };
  fr.readAsDataURL(file);
};

// ── Add / Edit ────────────────────────────────────────────────────────────────
document.getElementById('btn-add').onclick = () => {
  editIdx = -1;
  document.getElementById('modal-title').textContent = '기업 추가';
  document.getElementById('f-name').value = '';
  document.getElementById('f-stage').value = '';
  document.getElementById('f-category').replaceChildren(new Option('단계 먼저 선택', ''));
  document.getElementById('f-url').value = '';
  document.getElementById('f-featured').checked = false;
  currentLogo = '';
  openModal('edit');
};

function openEdit(i) {
  const c = companies[i];
  editIdx = i;
  document.getElementById('modal-title').textContent = '기업 수정';
  document.getElementById('f-name').value = c.name;
  document.getElementById('f-stage').value = c.stage;
  document.getElementById('f-stage').dispatchEvent(new Event('change'));
  document.getElementById('f-category').value = c.category;
  document.getElementById('f-url').value = c.url || '';
  document.getElementById('f-featured').checked = !!c.featured;
  currentLogo = c.logo || '';
  if (c.logo) {
    document.getElementById('logo-preview').src = rawUrl(c.logo);
    document.getElementById('logo-fname').textContent = c.logo;
    document.getElementById('logo-preview-wrap').classList.add('show');
  } else {
    document.getElementById('logo-preview-wrap').classList.remove('show');
  }
  pendingFile = null;
  openModal('edit');
}

async function saveCompany() {
  const name = document.getElementById('f-name').value.trim();
  const stage = document.getElementById('f-stage').value;
  const category = document.getElementById('f-category').value;
  const url = document.getElementById('f-url').value.trim();
  const featured = document.getElementById('f-featured').checked;

  if (!name || !stage || !category) { alert('기업명, 단계, 카테고리는 필수입니다.'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '저장 중...';

  try {
    let logo = currentLogo;
    if (pendingFile) {
      setStatus('loading', `로고 업로드 중: ${pendingFile.name}`);
      await uploadLogo(pendingFile);
      logo = pendingFile.name;
    }

    const entry = { name, stage, category, logo, url, featured };
    if (editIdx === -1) companies.push(entry);
    else companies[editIdx] = entry;

    setStatus('loading', 'companies.json 저장 중...');
    await persistCompanies(editIdx === -1 ? `Add: ${name}` : `Update: ${name}`);

    closeModal('edit');
    renderList();
    setStatus('success', `✓ "${name}" ${editIdx === -1 ? '추가' : '수정'} 완료`);
    setTimeout(clearStatus, 3000);
  } catch (e) {
    setStatus('error', `오류: ${e.message}`);
  } finally {
    btn.disabled = false; btn.textContent = '저장';
  }
}

async function deleteCompany(i) {
  const c = companies[i];
  if (!confirm(`"${c.name}"을(를) 삭제하시겠습니까?`)) return;
  companies.splice(i, 1);
  setStatus('loading', '저장 중...');
  try {
    await persistCompanies(`Remove: ${c.name}`);
    renderList();
    setStatus('success', `✓ "${c.name}" 삭제 완료`);
    setTimeout(clearStatus, 3000);
  } catch (e) {
    companies.splice(i, 0, c);
    setStatus('error', `오류: ${e.message}`);
  }
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('search').oninput = e => { query = e.target.value; renderList(); };

// ── Init ──────────────────────────────────────────────────────────────────────
async function loadData() {
  if (!cfg.pat) { openModal('settings'); return; }
  setStatus('loading', 'GitHub에서 데이터를 불러오는 중...');
  try {
    await fetchCompanies();
    clearStatus();
    renderList();
  } catch (e) {
    setStatus('error', `로딩 실패: ${e.message} — GitHub 설정을 확인해주세요.`);
  }
}

initStageSelect();
loadCfg();
loadData();
</script>
